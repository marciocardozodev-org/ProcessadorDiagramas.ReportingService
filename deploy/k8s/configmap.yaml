  ASPNETCORE_URLS: "http://+:8080"
  ProcessingService__BaseUrl: "http://processador-diagramas-processingservice"
  ProcessingService__TimeoutSeconds: "30"
  Service__Name: "ProcessadorDiagramas.ReportingService"
